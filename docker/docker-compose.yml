# =============================================
# Docker Compose — Hệ thống Đặt phòng ICTU
# Chạy: docker-compose -f docker/docker-compose.yml up -d --build
# =============================================

version: '3.8'

services:
  # ===== 1. Cơ sở dữ liệu SQL Server =====
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: room_mssql
    restart: unless-stopped
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "YourStrong!Passw0rd"
    ports:
      - "1433:1433"
    volumes:
      - sql_data:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "YourStrong!Passw0rd" -C -Q "SELECT 1" || exit 1
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 30s

  # ===== 2. .NET 9 Backend API =====
  backend:
    build:
      context: ..              # Trỏ context về thư mục gốc (ngang hàng .sln)
      dockerfile: docker/Dockerfile.backend
    container_name: room_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=Server=db,1433;Database=RoomScheduling;User Id=sa;Password=YourStrong!Passw0rd;TrustServerCertificate=true;
    ports:
      - "5114:8080"

  # ===== 3. Frontend React + Node.js Proxy =====
  frontend:
    build:
      context: ../room-scheduling-interface  # Trỏ context vào thư mục frontend
      dockerfile: ../docker/Dockerfile.frontend
    container_name: room_frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DOTNET_API=http://backend:8080
      - JWT_SECRET=your_jwt_secret_here
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
    ports:
      - "3000:3000"

volumes:
  sql_data:
    name: room_sql_data
