version: '3.3'

services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: room_mssql
    restart: unless-stopped
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "YourStrong!Passw0rd"
    ports:
      - "1433:1433"
    volumes:
      - sql_data:/var/opt/mssql

  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    container_name: room_backend
    restart: unless-stopped
    depends_on:
      - db
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=Server=db,1433;Database=RoomScheduling;User Id=sa;Password=YourStrong!Passw0rd;TrustServerCertificate=true;
    ports:
      - "5114:8080"

  frontend:
    build:
      context: ../room-scheduling-interface
      dockerfile: ../docker/Dockerfile.frontend
    container_name: room_frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DOTNET_API=http://backend:8080
      - JWT_SECRET=your_jwt_secret_here
      - GEMINI_API_KEY=
    ports:
      - "3000:3000"

volumes:
  sql_data:
    driver: local
