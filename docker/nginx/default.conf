# =============================================
# Nginx Reverse Proxy — He thong Dat phong ICTU
# SSL: Cloudflare Full (Strict) + Origin Certificate
# =============================================

# Redirect HTTP -> HTTPS
server {
    listen 80;
    server_name localhost;
    return 301 https://$host$request_uri;
}

# HTTPS — Cloudflare Origin Certificate
server {
    listen 443 ssl;
    server_name localhost;

    ssl_certificate /etc/nginx/ssl/origin.pem;
    ssl_certificate_key /etc/nginx/ssl/origin-key.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Frontend (React)
    location / {
        proxy_pass http://frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Backend API
    # (Đã xóa block /api/ vì frontend Node.js tự handle /api/* và tự gọi sang .NET)

    # (Đã tắt Swagger ở môi trường Production)

    # Hangfire Dashboard
    location /hangfire {
        proxy_pass http://backend:8080/hangfire;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
