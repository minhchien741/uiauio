# Docker Compose PRODUCTION - He thong Dat phong ICTU
# Chay: docker compose -f docker/docker-compose.prod.yml --env-file docker/.env up -d --build

services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: room_mssql
    restart: unless-stopped
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${MSSQL_SA_PASSWORD}"
    ports:
      - "${DB_PORT:-1433}:1433"
    volumes:
      - sql_data:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "${MSSQL_SA_PASSWORD}" -Q "SELECT 1" -C -N
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    container_name: room_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=Server=db,1433;Database=${DB_NAME:-RoomScheduling};User Id=sa;Password=${MSSQL_SA_PASSWORD};TrustServerCertificate=true;
      - SmtpSettings__Host=${SMTP_HOST:-}
      - SmtpSettings__Port=${SMTP_PORT:-587}
      - SmtpSettings__Username=${SMTP_USER:-}
      - SmtpSettings__Password=${SMTP_PASS:-}
      - SmtpSettings__FromEmail=${SMTP_FROM:-}
    ports:
      - "${API_PORT:-5114}:8080"

  frontend:
    build:
      context: ../room-scheduling-interface
      dockerfile: ../docker/Dockerfile.frontend
    container_name: room_frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DOTNET_API=http://backend:8080
      - JWT_SECRET=${JWT_SECRET}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
    ports:
      - "${FE_PORT:-3000}:3000"

volumes:
  sql_data:
    driver: local
